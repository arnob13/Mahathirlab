        { q: "১. যদি কোনো অণুজীব এককোষী ও সুকেন্দ্রিক হয় এবং তার মধ্যে সালোকসংশ্লেষণকারী রঞ্জক থাকে কিন্তু কোনো ভ্রূণ গঠিত না হয়, তবে মারগুলিসের শ্রেণিবিন্যাস অনুযায়ী সেটিকে কোন রাজ্যে স্থান দেওয়া হবে?", o: ["মনেরা", "প্রোটিস্টা", "ফানজাই", "প্ল্যান্টি"], a: 1, e: "মারগুলিসের পাঁচ-রাজ্য শ্রেণিবিন্যাস অনুযায়ী: এককোষী ও সুকেন্দ্রিক → প্রোটিস্টা।" },

        { q: "৩. কোনো নতুন আবিষ্কৃত জীবের কোষে কাইটিন নির্মিত কোষপ্রাচীর এবং দেহে মাইসেলিয়াম পাওয়া গেল। জীবটি মৃতজীবী হলে সেটির শ্রেণিবিন্যাসের যৌক্তিক অবস্থান কোনটি?", o: ["সুপার কিংডম ১, রাজ্য মনেরা", "সুপার কিংডম ২, রাজ্য প্রোটিস্টা", "সুপার কিংডম ২, রাজ্য ফানজাই", "সুপার কিংডম ২, রাজ্য প্ল্যান্টি"], a: 2, e: "কাইটিন নির্মিত কোষপ্রাচীর → ছত্রাকের বৈশিষ্ট্য। সুপার কিংডম ২ = সুকেন্দ্রিক (ইউক্যারিওটা)।" },

        { q: "৫. বাস্তুতন্ত্রের ভারসাম্য রক্ষা এবং বিলুপ্তপ্রায় বন্যপ্রাণীর ভৌগোলিক বিস্তৃতি বিশ্লেষণের জন্য জীববিজ্ঞানের কোন দুটি শাখার সমন্বিত জ্ঞান আবশ্যক?", o: ["ফিজিওলজি ও মরফোলজি", "ইকোলজি ও বায়োজিওগ্রাফি", "ট্যাক্সোনমি ও জেনেটিক্স", "এমব্রায়োলজি ও প্যালিন্টোলজি"], a: 1, e: "ইকোলজি = জীব ও পরিবেশের সম্পর্ক। বায়োজিওগ্রাফি = জীবের ভৌগোলিক বিস্তৃতি।" },

        { q: "৭. শ্রেণিবিন্যাসের 'নেস্টেড হায়ারার্কি' বা ধাপসমূহের ক্ষেত্রে নিচের কোনটি সঠিক?", o: ["উপরের ধাপের চেয়ে নিচের ধাপে সদস্য সংখ্যা বেশি থাকে", "প্রতিটি ধাপ তার উপরের ধাপের একটি উপসেট (subset)", "নিচু ধাপে বৈশিষ্ট্যের মিল সবচেয়ে কম থাকে", "রাজ্য থেকে প্রজাতির দিকে গেলে সদস্য সংখ্যা ও সাদৃশ্য উভয়ই হ্রাস পায়"], a: 1, e: "নিচের ধাপ উপরের ধাপের অন্তর্ভুক্ত (subset)।" },

        { q: "৯৫. লালা রসের 'টায়ালিন' কোন খাদ্যের ওপর কাজ করে?", o: ["সিদ্ধ শ্বেতসার", "কাঁচা মাংস", "দুধের প্রোটিন", "ঘি"], a: 0, e: "টায়ালিন শুধুমাত্র সিদ্ধ শ্বেতসারে কাজ করে।" },

        { q: "৯৮. রক্ত গ্রুপ 'O' কে কেন 'সার্বজনীন দাতা' বলা হয়?", o: ["এতে সব ধরনের অ্যান্টিজেন আছে", "এর লোহিত রক্তকণিকায় কোনো অ্যান্টিজেন (A বা B) নেই, ফলে কোনো রক্তে এটি জমাট বাঁধে না", "এতে অ্যান্টিবডি নেই", "এটি খুব সাধারণ"], a: 1, e: "এতে কোনো অ্যান্টিজেন নেই বলে জমাট বাঁধে না।" },

        { q: "১০০. একজন ব্যক্তির সিস্টোলিক রক্তচাপ ১৪০ মিমি এবং ডায়াস্টোলিক ৯০ মিমি। তার চিকিৎসাবিজ্ঞানের ভাষায় অবস্থাকে কী বলা হয়?", o: ["নিম্ন রক্তচাপ", "উচ্চ রক্তচাপ (Hypertension)", "স্বাভাবিক রক্তচাপ", "হৃদরোগ"], a: 1, e: "১৪০/৯০ মিমি রক্তচাপকে উচ্চ রক্তচাপ বলা হয়।" }
    ];

    const quizArea = document.getElementById('quiz-area');
    const userAnswers = new Array(quizData.length).fill(null);
    let timeLeft = 60 * 60; 
    let timerInterval;

    function startTimer() {
        timerInterval = setInterval(() => {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                processResult("অটো-সাবমিট (সময় শেষ)");
            }
            timeLeft--;
        }, 1000);
    }

    function init() {
        quizData.forEach((data, index) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="q-text">${data.q}</div>
                <div class="options" id="opts-${index}">
                    ${data.o.map((option, i) => `<div class="opt" onclick="sel(${index}, ${i})">${option}</div>`).join('')}
                </div>
                <div class="explanation" id="exp-${index}">
                    <strong>সঠিক উত্তর: ${data.o[data.a]}</strong><hr>${data.e}
                </div>
            `;
            quizArea.appendChild(card);
        });
        document.getElementById('count-text').innerText = `০ / ${quizData.length}`;
        startTimer();
    }

    window.sel = (qIdx, oIdx) => {
        userAnswers[qIdx] = oIdx;
        const opts = document.getElementById(`opts-${qIdx}`).getElementsByClassName('opt');
        for (let opt of opts) opt.classList.remove('selected');
        opts[oIdx].classList.add('selected');
        const answered = userAnswers.filter(x => x !== null).length;
        const percent = Math.round((answered / quizData.length) * 100);
        document.getElementById('p-fill').style.width = percent + '%';
        document.getElementById('p-text').innerText = `সম্পন্ন: ${percent}%`;
        document.getElementById('count-text').innerText = `${answered} / ${quizData.length}`;
    };

    function submitExam() {
        let name = prompt("ফলাফল জমার জন্য তোমার পুরো নাম লিখো:");
        if (name) processResult(name);
        else alert("নাম দেওয়া বাধ্যতামূলক!");
    }

    function processResult(studentName) {
        clearInterval(timerInterval);
        let score = 0;
        quizData.forEach((data, index) => {
            const opts = document.getElementById(`opts-${index}`).getElementsByClassName('opt');
            const exp = document.getElementById(`exp-${index}`);
            if (userAnswers[index] === data.a) score++;
            else if (userAnswers[index] !== null) opts[userAnswers[index]].classList.add('wrong-ans');
            opts[data.a].classList.add('correct-ans');
            exp.style.display = 'block';
            for (let opt of opts) opt.style.pointerEvents = 'none';
        });

        emailjs.send(SERVICE_ID, TEMPLATE_ID, {
            student_name: studentName,
            score: score + " / " + quizData.length,
            date: new Date().toLocaleString('bn-BD')
        }).then(() => alert("সাফল্যের সাথে জমা হয়েছে!"))
        .catch(() => alert("ইমেইল পাঠাতে সমস্যা হয়েছে।"));

        document.getElementById('result-box').style.display = 'block';
        document.getElementById('score-text').innerText = `স্কোর: ${score} / ${quizData.length}`;
        document.getElementById('submit-btn').style.display = 'none';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    init();
</script>
